name: ActionFigureLog
options:
  bundleIdPrefix: com.shimondeitel.actionfigurelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ActionFigureLog:
    type: application
    platform: iOS
    sources:
      - path: ActionFigureLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.actionfigurelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ActionFigureLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ActionFigureLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ActionFigureLogTests
      - path: ActionFigureLog.storekit
    dependencies:
      - target: ActionFigureLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.actionfigurelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ActionFigureLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ActionFigureLogUITests
    dependencies:
      - target: ActionFigureLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.actionfigurelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ActionFigureLog:
    build:
      targets:
        ActionFigureLog: all
        ActionFigureLogTests: [test]
        ActionFigureLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: ActionFigureLog.storekit
    test:
      config: Debug
      storeKitConfiguration: ActionFigureLog.storekit
      targets:
        - ActionFigureLogTests
        - ActionFigureLogUITests
    archive:
      config: Release
